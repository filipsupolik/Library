<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Noto+Sans+Runic&family=Playfair+Display:ital,wght@0,400..900;1,400..900&family=Pliant:ital,wght@0,100..900;1,100..900&display=swap"
      rel="stylesheet"
    />
    <title>Book library</title>
  </head>
  <body>
    <div class="topbar">
      <div class="title">
        <h1>My Library</h1>
      </div>
      <button class="add-button">+</button>
    </div>
    <div class="main-content">
      <div class="card-container"></div>
    </div>
    <dialog>
      <h2>New book</h2>
      <form action="/index.html" method="post"  id="bookForm">
        <div class="form-content">
          <div class="row">
            <label for="title">Title</label>
            <input type="text" name="title" id="title">
          </div>
          <div class="row">
            <label for="author">Author</label>
            <input type="text" name="author" id="author">
          </div>
          <div class="row">
            <label for="pages">Pages</label>
            <input type="number" name="pages" id="pages">
          </div>
          <div class="row">
            <label for="status">Status</label>
            <select name="status" id="status">
              <option value="Unread">Unread</option>
              <option value="Read">Read</option>
            </select>
          </div>
        </div>
        <div class="buttons-container">
          <button class="cancelButtn">Cancel</button>
          <button type="submit" id="submit-button">Add book</button>
        </div>
      </form>
    </dialog>
    <script src="script.js"></script>
  </body>
</html>
